<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XPAND — Your WhatsApp Profile, in one link.{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50:  '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                        theme: {
                            bg:           'var(--bg)',
                            surface:      'var(--surface)',
                            card:         'var(--card)',
                            border:       'var(--border)',
                            'border-subtle': 'var(--border-subtle)',
                            text:         'var(--text)',
                            muted:        'var(--muted)',
                            placeholder:  'var(--placeholder)',
                            input:        'var(--input)',
                            'input-border': 'var(--input-border)',
                            'input-text': 'var(--input-text)',
                            label:        'var(--label)',
                            hover:        'var(--hover)',
                            'btn-bg':     'var(--btn-bg)',
                            'btn-border': 'var(--btn-border)',
                            'btn-active': 'var(--btn-active)',
                            'btn-active-text': 'var(--btn-active-text)',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'slide-up': 'slideUp 0.25s ease-out',
                        'pulse-slow': 'pulse 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        [x-cloak] { display: none !important; }

        :root {
            {% if current_theme == 'light' %}
            --bg:               #f4f6f9;
            --surface:          #eef0f4;
            --card:             #ffffff;
            --border:           #e2e5ea;
            --border-subtle:    #edf0f3;
            --text:             #0f1117;
            --muted:            #6b7280;
            --placeholder:      rgba(107,114,128,0.55);
            --label:            #4b5563;
            --input:            #f9fafb;
            --input-border:     #d1d5db;
            --input-text:       #0f1117;
            --hover:            #f1f3f6;
            --btn-bg:           #f3f4f6;
            --btn-border:       #d1d5db;
            --btn-active:       #0f1117;
            --btn-active-text:  #ffffff;
            {% elif current_theme == 'whatsapp-green' %}
            --bg:               #071a12;
            --surface:          #0a2119;
            --card:             #0d2b20;
            --border:           #134d35;
            --border-subtle:    #0f3d28;
            --text:             #ecfdf5;
            --muted:            #6ee7b7;
            --placeholder:      rgba(110,231,183,0.45);
            --label:            #a7f3d0;
            --input:            #071a12;
            --input-border:     #15573b;
            --input-text:       #ecfdf5;
            --hover:            #0a2a1e;
            --btn-bg:           #0a2119;
            --btn-border:       #15573b;
            --btn-active:       #16a34a;
            --btn-active-text:  #ffffff;
            {% else %}
            --bg:               #070d19;
            --surface:          #0c1525;
            --card:             #0f1c30;
            --border:           #1e2d42;
            --border-subtle:    #162030;
            --text:             #f1f5f9;
            --muted:            #64748b;
            --placeholder:      rgba(100,116,139,0.5);
            --label:            #94a3b8;
            --input:            #070d19;
            --input-border:     #1e2d42;
            --input-text:       #f1f5f9;
            --hover:            #132032;
            --btn-bg:           #0c1525;
            --btn-border:       #1e2d42;
            --btn-active:       #1e2d42;
            --btn-active-text:  #f1f5f9;
            {% endif %}
        }

        body {
            background-color: var(--bg) !important;
            color: var(--text) !important;
            transition: background-color 0.25s ease, color 0.25s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* Glassmorphism utility */
        .glass {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
        }

        /* Green glow utility */
        .glow-green {
            box-shadow: 0 0 0 1px rgba(34,197,94,0.15), 0 4px 20px rgba(34,197,94,0.08);
        }

        .glow-green-lg {
            box-shadow: 0 0 0 1px rgba(34,197,94,0.2), 0 8px 40px rgba(34,197,94,0.15);
        }

        /* Focus ring */
        input:focus, textarea:focus, select:focus {
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(34,197,94,0.35) !important;
            border-color: rgba(34,197,94,0.6) !important;
        }

        /* Smooth transitions for all interactive elements */
        button, a, input, textarea, select, label {
            transition-property: color, background-color, border-color, box-shadow, opacity, transform;
            transition-duration: 150ms;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #4ade80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Animated gradient background */
        .gradient-bg {
            background: linear-gradient(135deg, rgba(34,197,94,0.05) 0%, transparent 50%, rgba(34,197,94,0.03) 100%);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="h-full flex flex-col font-sans antialiased bg-theme-bg text-theme-text">
    {% block content %}{% endblock %}

    <!-- Floating Theme Switcher — hidden on dashboard (it has its own) -->
    {% if request.resolver_match.view_name != 'profiles:dashboard' %}
    <div class="fixed bottom-5 right-5 z-50"
         x-data="{ open: false }"
         @click.away="open = false">

        <!-- Toggle button -->
        <button @click="open = !open"
            class="w-9 h-9 rounded-full flex items-center justify-center border border-theme-border bg-theme-card shadow-lg hover:scale-110 transition-transform"
            title="Change theme">
            <svg class="w-4 h-4 text-theme-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4" stroke-width="2"/>
                <path stroke-linecap="round" stroke-width="2" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
        </button>

        <!-- Swatch strip -->
        <div x-show="open" x-cloak x-transition
             class="absolute bottom-11 right-0 flex flex-col gap-2 p-2.5 rounded-2xl border border-theme-border bg-theme-card shadow-xl">
            <button hx-post="{% url 'profiles:update_theme' %}" hx-vals='{"theme": "light"}' hx-target="body" hx-swap="none"
                class="w-6 h-6 rounded-full bg-white border border-gray-200 hover:scale-110 {% if current_theme == 'light' %}ring-2 ring-brand-500 ring-offset-1{% endif %}"
                title="Light"></button>
            <button hx-post="{% url 'profiles:update_theme' %}" hx-vals='{"theme": "dark"}' hx-target="body" hx-swap="none"
                class="w-6 h-6 rounded-full bg-[#070d19] border border-slate-700 hover:scale-110 {% if current_theme == 'dark' %}ring-2 ring-brand-500 ring-offset-1 ring-offset-[#070d19]{% endif %}"
                title="Dark"></button>
            <button hx-post="{% url 'profiles:update_theme' %}" hx-vals='{"theme": "whatsapp-green"}' hx-target="body" hx-swap="none"
                class="w-6 h-6 rounded-full bg-[#071a12] border border-emerald-900 hover:scale-110 {% if current_theme == 'whatsapp-green' %}ring-2 ring-brand-500 ring-offset-1 ring-offset-[#071a12]{% endif %}"
                title="Green"></button>
        </div>
    </div>
    {% endif %}

    <!-- HTMX CSRF injection -->
    <script>
        document.addEventListener('htmx:configRequest', (e) => {
            const name = 'csrftoken';
            let v = null;
            if (document.cookie) {
                for (const c of document.cookie.split(';')) {
                    const t = c.trim();
                    if (t.startsWith(name + '=')) { v = decodeURIComponent(t.slice(name.length + 1)); break; }
                }
            }
            if (v) e.detail.headers['X-CSRFToken'] = v;
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
