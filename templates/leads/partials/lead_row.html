<tr id="lead-row-{{ lead.id }}" class="hover:bg-theme-hover transition-colors group {% if not lead.is_read %}bg-theme-surface/30 font-medium{% else %}opacity-80{% endif %}">
    <!-- Lead Details -->
    <td class="px-5 py-3.5">
        <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-xl bg-brand-500/10 border border-brand-500/15 flex items-center justify-center flex-shrink-0 text-xs font-bold text-brand-400">
                {{ lead.name|slice:":1"|upper }}
            </div>
            <div class="min-w-0">
                <p class="text-xs leading-tight {% if not lead.is_read %}font-bold text-theme-text{% else %}font-semibold text-theme-text{% endif %}">{{ lead.name }}</p>
                <p class="text-[11px] text-theme-muted mt-0.5 truncate">{{ lead.email }}</p>
                <p class="text-[11px] text-theme-muted font-mono">{{ lead.whatsapp_number }}</p>
            </div>
        </div>
    </td>
    
    <!-- Source CTA -->
    <td class="px-5 py-3.5">
        <p class="text-xs leading-tight {% if not lead.is_read %}font-bold text-theme-text{% else %}font-semibold text-theme-text{% endif %}">{{ lead.link_label_snapshot }}</p>
        <p class="text-[11px] text-theme-muted mt-0.5">{{ lead.cta_text_snapshot }}</p>
    </td>
    
    <!-- Message -->
    <td class="px-5 py-3.5 max-w-[200px]">
        {% if lead.message %}
        <p class="text-xs text-theme-muted truncate" title="{{ lead.message }}">{{ lead.message }}</p>
        {% else %}
        <span class="text-[11px] text-theme-muted/50">—</span>
        {% endif %}
    </td>
    
    <!-- Date -->
    <td class="px-5 py-3.5 text-[11px] text-theme-muted whitespace-nowrap font-mono">
        {{ lead.created_at|date:"Y-m-d" }}<br>
        <span class="text-[10px] opacity-70">{{ lead.created_at|date:"H:i" }}</span>
    </td>

    <!-- Actions (Gmail-style) -->
    <td class="px-5 py-3.5 text-right whitespace-nowrap">
        <div class="flex items-center justify-end gap-2.5 opacity-0 group-hover:opacity-100 transition-opacity">
            <!-- Reply to Lead (WhatsApp One-Tap) -->
            <a href="javascript:void(0)"
               onclick="window.open('{{ lead.whatsapp_reply_url }}', '_blank')"
               {% if not lead.is_read %}
               hx-post="{% url 'leads:mark_lead_read' lead.id %}"
               hx-target="#lead-row-{{ lead.id }}"
               hx-swap="outerHTML"
               {% endif %}
               title="Reply on WhatsApp"
               class="p-1.5 rounded-lg border border-theme-border bg-theme-btn-bg text-theme-muted hover:text-emerald-500 hover:bg-theme-hover hover:border-theme-muted transition-all">
                <!-- Chat / Reply bubble icon -->
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
            </a>

            <!-- Mark as Read / Unread -->
            <button hx-post="{% url 'leads:toggle_lead_read' lead.id %}"
                    hx-target="#lead-row-{{ lead.id }}"
                    hx-swap="outerHTML"
                    title="{% if lead.is_read %}Mark as unread{% else %}Mark as read{% endif %}"
                    class="p-1.5 rounded-lg border border-theme-border bg-theme-btn-bg text-theme-muted hover:text-theme-text hover:bg-theme-hover hover:border-theme-muted transition-all">
                {% if lead.is_read %}
                <!-- Open Envelope icon (Mark Unread) -->
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5m0 0l-2.25 1.5a2 2 0 01-2.22 0l-2.25-1.5"/>
                </svg>
                {% else %}
                <!-- Closed Envelope icon (Mark Read) -->
                <svg class="w-3.5 h-3.5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                {% endif %}
            </button>

            <!-- Archive / Unarchive -->
            <button hx-post="{% url 'leads:toggle_lead_archive' lead.id %}"
                    hx-target="#lead-row-{{ lead.id }}"
                    hx-swap="outerHTML"
                    title="{% if lead.is_archived %}Unarchive{% else %}Archive{% endif %}"
                    class="p-1.5 rounded-lg border border-theme-border bg-theme-btn-bg text-theme-muted hover:text-theme-text hover:bg-theme-hover hover:border-theme-muted transition-all">
                {% if lead.is_archived %}
                <!-- Inbox/Unarchive icon -->
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2m-4-1v8m0 0l3-3m-3 3L9 8m-5 5h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293h3.172a1 1 0 00.707-.293l2.414-2.414a1 1 0 01.707-.293H20"/>
                </svg>
                {% else %}
                <!-- Archive icon -->
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                </svg>
                {% endif %}
            </button>
        </div>
    </td>
</tr>
