<div class="space-y-5 animate-slide-up">
    <!-- Header -->
    <div class="text-center space-y-1">
        <div class="w-12 h-12 rounded-2xl bg-brand-500/15 border border-brand-500/25 flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
        </div>
        <h3 class="text-base font-bold text-theme-text">Almost there!</h3>
        <p class="text-xs text-theme-muted">
            Registration code sent to <span class="font-semibold text-theme-text">{{ phone_number }}</span>
        </p>
    </div>

    <form hx-post="{% url 'authentication:signup_verify' %}" hx-target="#verify-error" hx-swap="innerHTML" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="phone_number" value="{{ phone_number }}">

        <div>
            <label for="otp" class="block text-xs font-semibold uppercase tracking-wider text-theme-label mb-1.5">
                One-Time Password
            </label>
            <input type="text" name="otp" id="otp" required placeholder="• • • • • •" maxlength="6"
                autofocus
                class="block w-full px-4 py-3.5 bg-theme-input border border-theme-input-border rounded-xl text-theme-input-text placeholder-theme-placeholder text-xl tracking-[0.5em] text-center font-bold">
            <div id="verify-error" class="mt-2"></div>
        </div>

        <button type="submit"
            class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-bold text-white bg-brand-500 hover:bg-brand-600 hover:-translate-y-0.5 shadow-lg shadow-brand-500/20 active:translate-y-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
            </svg>
            Verify & Create Account
        </button>
    </form>

    <p class="text-center text-[11px] text-theme-muted">
        Didn't receive it?
        <button class="text-brand-500 hover:text-brand-400 font-semibold ml-0.5" onclick="window.location.reload()">
            Try again
        </button>
    </p>
</div>
