{% extends "base.html" %}
{% block title %}Admin Login — XPAND{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center px-4 relative overflow-hidden bg-theme-bg">
    <!-- Aura glow graphics -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden" aria-hidden="true">
        <i class="absolute w-[500px] h-[500px] rounded-full filter blur-[100px] opacity-15" style="background:#22c55e; top:-10%; left:-10%;"></i>
        <i class="absolute w-[500px] h-[500px] rounded-full filter blur-[100px] opacity-10" style="background:#0ea5e9; bottom:-10%; right:-10%;"></i>
    </div>

    <!-- Login Card Container -->
    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <!-- Logo and Heading -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 rounded-2xl bg-brand-500 flex items-center justify-center shadow-lg shadow-brand-500/20 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-theme-text tracking-tight">XPAND Admin</h1>
            <p class="text-sm text-theme-muted mt-1.5">Sign in to manage the platform</p>
        </div>

        <!-- Login Form -->
        <div class="bg-theme-card border border-theme-border rounded-2xl shadow-xl p-6 sm:p-8">
            {% if error_msg %}
            <div class="mb-4 text-red-500 bg-red-500/10 border border-red-500/20 rounded-xl p-3.5 text-xs font-semibold text-center">
                {{ error_msg }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'admin_panel:login' %}" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="phone_number" class="block text-[10px] font-bold uppercase tracking-widest text-theme-label mb-2">Phone Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="text-xs text-theme-muted font-bold">+91</span>
                        </div>
                        <input type="tel" name="phone_number" id="phone_number" required placeholder="9876543210" value="{{ phone_init }}"
                            class="w-full bg-theme-input border border-theme-input-border rounded-xl pl-11 pr-3.5 py-3 text-sm text-theme-input-text placeholder-theme-placeholder focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-theme-label mb-2">Password</label>
                    <input type="password" name="password" id="password" required placeholder="••••••••"
                        class="w-full bg-theme-input border border-theme-input-border rounded-xl px-3.5 py-3 text-sm text-theme-input-text placeholder-theme-placeholder focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex items-center justify-center bg-brand-500 hover:bg-brand-600 text-white py-3 text-sm font-bold rounded-xl shadow-lg shadow-brand-500/15 hover:-translate-y-0.5 active:translate-y-0">
                        Sign In &rarr;
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
